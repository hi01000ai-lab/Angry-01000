<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세로형 영상 테스트 (전진.mp4)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; 
            overflow: hidden; 
        }

        .video-container {
            position: relative;
            width: 100vw;
            height: 100dvh; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        #nextBtn {
            position: absolute;
            bottom: 50px;
            right: 20px;
            padding: 12px 24px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            font-size: 16px;
            backdrop-filter: blur(5px); 
            cursor: pointer;
            z-index: 10;
        }

        #nextBtn:active {
            background-color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="mainVideo" src="전진.mp4" autoplay muted loop playsinline></video>
        
        <button id="nextBtn">다음 영상 ➔</button>
    </div>

    <script>
        // 테스트를 위해 전진.mp4 파일 하나만 배열에 3번 넣었습니다.
        // 나중에 다른 영상이 생기면 이 부분을 수정하시면 됩니다.
        const videos = [
            "전진.mp4",
            "전진.mp4",
            "전진.mp4"
        ];
        
        let currentIndex = 0; 
        const videoElement = document.getElementById("mainVideo");
        const nextBtn = document.getElementById("nextBtn");

        nextBtn.addEventListener("click", () => {
            // 다음 인덱스로 이동
            currentIndex = (currentIndex + 1) % videos.length;
            
            // 영상 소스 교체 (지금은 모두 전진.mp4로 동일하게 작동)
            videoElement.src = videos[currentIndex];
            
            // 버튼 클릭 후에는 소리가 나오도록 음소거 해제
            videoElement.muted = false; 
            
            // 영상 처음부터 다시 재생
            videoElement.play();
        });
    </script>
</body>
</html>
